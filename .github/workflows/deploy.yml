name: Build and Deploy
on:
  push:
    branches:
      - gen2
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Deno
        uses: denolib/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build
        run: |
          make dist

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@4.1.1
        with:
          branch: gen2-gh-pages
          folder: dist
